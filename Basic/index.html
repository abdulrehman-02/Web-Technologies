<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/ico" href="./Images/umt-logo.ico">
	<title>UMT - Sialkot | Learning Management System: Log in to the site</title>
</head>

<body style="font-family: sans-serif; background-image: url('./Images/background.jpg'); height: 100vh; width: 100vw; background-size: cover; margin: 0px; background-position: center;">

	<div style="display: flex; justify-content: center; align-items: flex-start; padding-top: 15vh;">
		<img src="./Images/umt-logo.png" alt="UMT Logo" width="150" height="170">
	</div>

	<div style="background-color: white; margin: 20px auto; border: 1px solid black; border-radius: 8px; width: 350px; padding: 30px;">

		<h3 style="font-weight: 400; margin-top: 0px;">Already have an account?</h3>
		
		<div style="margin-bottom: 15px;">
			<input type="text" placeholder="Username" style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px;">
		</div>

		<div style="margin-bottom: 20px;">
			<input type="password" placeholder="Password" style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px;">
		</div>

		<div style="margin-top: 15px; margin-bottom: 10px;">
            <input type="checkbox"> Remember Username
        </div>

		<div>
            <button style="width: 100%; padding: 12px; background-color: #007399; color: white; border: none; border-radius: 4px; font-weight: bold;">Log in</button>
        </div>

        <div style="margin-top: 15px; font-size: 14px; color: #007399;">
            <p>Forgotten your username or password?</p>
        </div>

		</div>
</body>
</html>
